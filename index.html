<!doctype html>
<html lang="fr">
  <head>
    <title>Esprit</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="app.js"></script>
  </head>
  <body>
    <div class="overlay"></div>
    <h1>Esprit NFT Collection</h1>
    <div id="passwordGate">
      <input
        id="passwordInput"
        type="password"
        placeholder="Entrer le mot de passe donné par le créateur pour pouvoir mint"
      />
      <button id="unlockButton" class="actionButton">
        Valider le mot de passe
      </button>
    </div>
    <button id="mintButton" class="actionButton" style="display: none">
      Minter mon NFT
    </button>
    <p id="status"></p>
    <!-- Pour afficher l'état (succès/erreur) -->
  </body>
</html>
